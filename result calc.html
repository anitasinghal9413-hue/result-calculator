<!DOCTYPE html>
<html>
<head>
    <title>Vani's 6-Subject Marksheet</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f4f8; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
        }
        .container { 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 400px;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .input-box { display: flex; justify-content: space-between; margin-bottom: 10px; }
        label { font-weight: 500; color: #555; }
        input { width: 60px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        
        button { 
            width: 100%; padding: 12px; background: #3498db; 
            color: white; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; margin-top: 15px;
        }
        button:hover { background: #2980b9; }

        #final-result { 
            margin-top: 20px; padding: 15px; border-radius: 8px; 
            display: none; text-align: center; font-weight: bold;
        }
        .pass { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Academic Report Card</h2>
    
    <div class="input-box"><label>Mathematics:</label> <input type="number" id="s1" class="marks"></div>
    <div class="input-box"><label>Science:</label> <input type="number" id="s2" class="marks"></div>
    <div class="input-box"><label>English:</label> <input type="number" id="s3" class="marks"></div>
    <div class="input-box"><label>Hindi:</label> <input type="number" id="s4" class="marks"></div>
    <div class="input-box"><label>Computer:</label> <input type="number" id="s5" class="marks"></div>
    <div class="input-box"><label>Social Science:</label> <input type="number" id="s6" class="marks"></div>

    <button onclick="calculateResult()">Generate Result</button>

    <div id="final-result"></div>
</div>

<script>
    function calculateResult() {
        // Saare marks ko array mein lena
        let marksInput = document.getElementsByClassName('marks');
        let total = 0;
        let valid = true;

        for (let i = 0; i < marksInput.length; i++) {
            let val = parseFloat(marksInput[i].value);
            
            // Check: Marks empty nahi hone chahiye aur 0-100 ke beech hone chahiye
            if (isNaN(val) || val < 0 || val > 100) {
                valid = false;
                break;
            }
            total += val;
        }

        if (!valid) {
            alert("Vani, please saare subjects ke sahi marks (0-100) bhariye!");
            return;
        }

        // Percentage Calculation ($Percentage = \frac{Total}{600} \times 100$)
        let percentage = (total / 600) * 100;
        let resultDiv = document.getElementById('final-result');
        resultDiv.style.display = "block";

        // Logic for Pass/Fail
        if (percentage >= 33) {
            resultDiv.className = "pass";
            resultDiv.innerHTML = `PASS <br> Total: ${total}/600 <br> Percentage: ${percentage.toFixed(2)}%`;
        } else {
            resultDiv.className = "fail";
            resultDiv.innerHTML = `FAIL <br> Total: ${total}/600 <br> Percentage: ${percentage.toFixed(2)}%`;
        }
    }
</script>

</body>
</html>
